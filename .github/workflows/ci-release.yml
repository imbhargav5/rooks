name: CI and Version Packages
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches:
      - main
jobs:
  test:
    name: Build (production)
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'imbhargav5/rooks' && github.ref == 'refs/heads/main' }}
    steps:
      - name: "Check if user has write access"
        uses: "lannonbr/repo-permission-check-action@2.0.0"
        with:
          permission: "write"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ CI Setup
        uses: ./.github/actions/ci-setup

      - name: run all checks and get coverage
        run: pnpm run all-checks

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v2
        with:
          directory: packages/rooks/src/coverage

  version:
    name: Version
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: ${{ github.repository == 'imbhargav5/rooks' &&
      github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ CI Setup
        uses: ./.github/actions/ci-setup

      - name: Create Release Pull Request or detect merged version
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
