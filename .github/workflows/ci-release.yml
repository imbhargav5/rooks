name: CI and Semantic Release
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches:
      - main
      - alpha
      - next
jobs:
  test:
    name: Build (production)
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'imbhargav5/rooks' && contains('refs/heads/main,refs/heads/alpha,refs/heads/next',github.ref)}}
    steps:
      - name: "Check if user has write access"
        uses: "lannonbr/repo-permission-check-action@2.0.0"
        with:
          permission: "write"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ CI Setup
        uses: ./.github/actions/ci-setup

      - name: run all checks and get coverage
        run: pnpm run all-checks

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v2
        with:
          directory: packages/rooks/src/coverage

  version:
    name: Version
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: ${{ github.repository == 'imbhargav5/rooks' &&
      contains('refs/heads/main,refs/heads/alpha,refs/heads/next',github.ref) && github.event_name == 'push' }}
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ CI Setup
        uses: ./.github/actions/ci-setup

      - name: Create Release Pull Request or detect merged version
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish To NPM
    needs: version
    if: needs.version.outputs.hasChangesets == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ CI Setup
        uses: ./.github/actions/ci-setup

      - name: 📦 Setup Node.js with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: "https://registry.npmjs.org"

      - name: Install latest npm (>=11.5.1 for OIDC)
        run: npm install -g npm@latest

      - name: 🏗 Run build script
        run: pnpm turbo prepare-publish

      - name: 🚀 Publish to npm
        run: npm publish --access public
        working-directory: packages/rooks
